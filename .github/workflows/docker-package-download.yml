name: Docker Package Download
run-name: Docker Package @${{ inputs.release_type }} from ${{ inputs.ref }} by @${{ github.actor }}

on:
  workflow_call:
    inputs:
      release_type:
        required: false
        type: string
        default: main
        description: "Release type. One of 'main', 'main-backend', 'main-frontend', 'main-ep', 'base', 'main-all'."
      pre_release:
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: dx_dev
        description: "Ref to check out (branch, tag, or commit)."
      push_to_registry:
        required: false
        type: boolean
        default: false
        description: "Kept for compatibility with docker-build-v2 style. This workflow does not push images."
      upload_release_asset:
        required: false
        type: boolean
        default: true
        description: "Upload the exported tar.zst file to a GitHub Release."
      create_latest_alias:
        required: false
        type: boolean
        default: true
        description: "Also upload a fixed-name alias asset for stable latest-download links."
      no_export:
        required: false
        type: boolean
        default: false
        description: "If true, skip docker save | zstd export."
      arch:
        required: false
        type: string
        default: amd64
        description: "Target architecture for docker build. Usually amd64."
      image_name:
        required: false
        type: string
        default: langflow-custom
        description: "Final local image name."
      image_tag:
        required: false
        type: string
        default: latest
        description: "Final local image tag."

  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release. One of 'main', 'main-backend', 'main-frontend', 'main-ep', 'base', 'main-all'."
        required: false
        type: choice
        options:
          - main
          - main-backend
          - main-frontend
          - main-ep
          - base
          - main-all
      pre_release:
        description: "Whether this is a pre-release."
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: dx_dev
        description: "Ref to check out (branch, tag, or commit)."
      push_to_registry:
        description: "Compatibility input only. This workflow does not push images."
        required: false
        type: boolean
        default: false
      upload_release_asset:
        description: "Upload the exported tar.zst file to a GitHub Release."
        required: false
        type: boolean
        default: true
      create_latest_alias:
        description: "Also upload a fixed-name alias asset for stable latest-download links."
        required: false
        type: boolean
        default: true
      no_export:
        description: "If true, skip docker save | zstd export."
        required: false
        type: boolean
        default: false
      arch:
        description: "Target architecture for docker build."
        required: false
        type: choice
        options:
          - amd64
          - arm64
        default: amd64
      image_name:
        description: "Final local image name."
        required: false
        type: string
        default: langflow-custom
      image_tag:
        description: "Final local image tag."
        required: false
        type: string
        default: latest

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  determine-base-version:
    name: Determine Base Version
    if: ${{ inputs.release_type == 'base' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail
          version=$(uv tree 2>/dev/null | grep '^langflow-base' | cut -d' ' -f2 | sed 's/^v//')
          if [[ -z "$version" ]]; then
            echo "Failed to determine base version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved base version: $version"

  determine-main-version:
    name: Determine Main Version
    if: ${{ inputs.release_type != 'base' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail
          version=$(python -c 'import re, pathlib; text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8"); m = re.search(r"^\s*version\s*=\s*\"([^\"]+)\"", text, re.M); print(m.group(1) if m else "")')
          if [[ -z "$version" ]]; then
            echo "Failed to determine main version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved main version: $version"

  package-image:
    name: Build and Export Docker Image
    needs: [determine-base-version, determine-main-version]
    if: |
      always() &&
      (
        (inputs.release_type == 'base' && needs.determine-base-version.result == 'success') ||
        (inputs.release_type != 'base' && needs.determine-main-version.result == 'success')
      )
    runs-on: ubuntu-latest
    outputs:
      image_full_name: ${{ steps.meta.outputs.image_full_name }}
      version: ${{ steps.meta.outputs.version }}
      dockerfile: ${{ steps.meta.outputs.dockerfile }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      archive_file: ${{ steps.export.outputs.archive_file }}
      alias_file: ${{ steps.export.outputs.alias_file }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ "${{ inputs.release_type }}" == "base" ]]; then
            version="${{ needs.determine-base-version.outputs.version }}"
          else
            version="${{ needs.determine-main-version.outputs.version }}"
          fi

          case "${{ inputs.release_type }}" in
            base)
              dockerfile="./docker/build_and_push_base.Dockerfile"
              ;;
            main)
              dockerfile="./docker/build_and_push.Dockerfile"
              ;;
            main-backend)
              dockerfile="./docker/build_and_push_backend.Dockerfile"
              ;;
            main-frontend)
              dockerfile="./docker/frontend/build_and_push_frontend.Dockerfile"
              ;;
            main-ep)
              dockerfile="./docker/build_and_push_ep.Dockerfile"
              ;;
            main-all)
              dockerfile="./docker/build_and_push_with_extras.Dockerfile"
              ;;
            *)
              echo "Invalid release_type: ${{ inputs.release_type }}" >&2
              exit 1
              ;;
          esac

          image_full_name="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          release_tag="package-${{ inputs.release_type }}-${version}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$dockerfile" >> "$GITHUB_OUTPUT"
          echo "image_full_name=$image_full_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

          echo "Resolved version: $version"
          echo "Resolved dockerfile: $dockerfile"
          echo "Resolved image: $image_full_name"
          echo "Resolved release tag: $release_tag"

      - name: Validate required paths
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f "${{ steps.meta.outputs.dockerfile }}"

      - name: Set up QEMU
        if: ${{ inputs.arch == 'arm64' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        if: ${{ inputs.release_type == 'main' || inputs.release_type == 'main-frontend' || inputs.release_type == 'main-all' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install zstd
        if: ${{ inputs.no_export == false }}
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Build frontend
        if: ${{ inputs.release_type == 'main' || inputs.release_type == 'main-frontend' || inputs.release_type == 'main-all' }}
        working-directory: ./src/frontend
        shell: bash
        run: |
          set -Eeuo pipefail
          npm ci
          npm run build

      - name: Remove existing Docker image if present
        shell: bash
        run: |
          set -Eeuo pipefail
          if docker image inspect "${{ steps.meta.outputs.image_full_name }}" >/dev/null 2>&1; then
            docker rmi -f "${{ steps.meta.outputs.image_full_name }}"
          fi

      - name: Docker cleanup before build
        shell: bash
        run: |
          set -Eeuo pipefail
          docker system df || true
          docker buildx du || true
          docker system prune -af --volumes || true
          docker buildx prune -af || true

      - name: Build Docker image
        shell: bash
        run: |
          set -Eeuo pipefail

          PLATFORM="linux/${{ inputs.arch }}"
          IMAGE="${{ steps.meta.outputs.image_full_name }}"
          DOCKERFILE="${{ steps.meta.outputs.dockerfile }}"

          docker buildx build \
            --platform "$PLATFORM" \
            --file "$DOCKERFILE" \
            --tag "$IMAGE" \
            --load \
            .

      - name: Inspect Docker image
        shell: bash
        run: |
          set -Eeuo pipefail
          docker image inspect "${{ steps.meta.outputs.image_full_name }}" | head -n 60

      - name: Export Docker image archive
        id: export
        if: ${{ inputs.no_export == false }}
        shell: bash
        run: |
          set -Eeuo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          IMAGE_NAME="${{ inputs.image_name }}"
          IMAGE_TAG="${{ inputs.image_tag }}"
          ARCH="${{ inputs.arch }}"
          RELEASE_TYPE="${{ inputs.release_type }}"
          IMAGE="${{ steps.meta.outputs.image_full_name }}"

          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")

          ARCHIVE_FILE="${IMAGE_NAME}_${IMAGE_TAG}_${RELEASE_TYPE}_${VERSION}_${ARCH}_${TIMESTAMP}.tar.zst"
          ALIAS_FILE="${IMAGE_NAME}_${IMAGE_TAG}_${RELEASE_TYPE}_${ARCH}.tar.zst"

          docker save "$IMAGE" | zstd -T0 -o "$ARCHIVE_FILE"
          cp "$ARCHIVE_FILE" "$ALIAS_FILE"

          sha256sum "$ARCHIVE_FILE" > "${ARCHIVE_FILE}.sha256"
          sha256sum "$ALIAS_FILE" > "${ALIAS_FILE}.sha256"

          echo "archive_file=$ARCHIVE_FILE" >> "$GITHUB_OUTPUT"
          echo "alias_file=$ALIAS_FILE" >> "$GITHUB_OUTPUT"

          echo "Created archive: $ARCHIVE_FILE"
          echo "Created alias:   $ALIAS_FILE"

      - name: Upload workflow artifact
        if: ${{ inputs.no_export == false }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.release_type }}-${{ steps.meta.outputs.version }}-${{ inputs.arch }}
          path: |
            ${{ steps.export.outputs.archive_file }}
            ${{ steps.export.outputs.archive_file }}.sha256
            ${{ steps.export.outputs.alias_file }}
            ${{ steps.export.outputs.alias_file }}.sha256
          retention-days: 14

      - name: Create or update Release
        if: ${{ inputs.no_export == false && inputs.upload_release_asset == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Docker Package ${{ inputs.release_type }} ${{ steps.meta.outputs.version }}
          prerelease: ${{ inputs.pre_release }}
          generate_release_notes: true
          files: |
            ${{ steps.export.outputs.archive_file }}
            ${{ steps.export.outputs.archive_file }}.sha256
            ${{ steps.export.outputs.alias_file }}
            ${{ steps.export.outputs.alias_file }}.sha256

      - name: Print download URLs
        if: ${{ inputs.no_export == false }}
        shell: bash
        run: |
          set -Eeuo pipefail

          REPO="${{ github.repository }}"
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          ARCHIVE_FILE="${{ steps.export.outputs.archive_file }}"
          ALIAS_FILE="${{ steps.export.outputs.alias_file }}"

          echo "Release page:"
          echo "https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"

          echo ""
          echo "Direct archive download:"
          echo "https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${ARCHIVE_FILE}"

          echo ""
          echo "Stable alias download:"
          echo "https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${ALIAS_FILE}"

          {
            echo "## Docker package download links"
            echo ""
            echo "- Release page: https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
            echo "- Direct archive: https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${ARCHIVE_FILE}"
            echo "- Stable alias: https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${ALIAS_FILE}"
            echo ""
            echo "Load command:"
            echo '```bash'
            echo "zstd -d -c ${ALIAS_FILE} | docker load"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
